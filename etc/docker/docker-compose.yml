# ============================================================
# docker-compose.yml - KnowledgeHub 生产环境部署
# ============================================================
#
# 架构：Nginx 代理模式，所有外部访问通过 80 端口
#   浏览器 → Angular(Nginx:80) → API(内部:44354)
#   API 不对外暴露端口，仅通过 Nginx 反向代理访问
#
# 远程目录结构：
#   ~/knowledgehub/
#   ├── docker-compose.yml      ← 本文件
#   ├── .env                    ← 环境变量（从 .env.example 复制）
#   ├── nginx-proxy.conf        ← Nginx 代理配置
#   ├── dynamic-env.json        ← Angular 运行时配置（由 deploy.sh 自动生成）
#   ├── deploy.sh               ← 管理脚本
#   ├── uploads/                ← 文件上传目录
#   ├── postgres_data/          ← PostgreSQL 数据（bind mount，down -v 安全）
#   └── meilisearch_data/       ← 搜索引擎数据
#
# 使用方式：
#   ./deploy.sh up              # 启动所有服务
#   ./deploy.sh down            # 停止所有服务
#   ./deploy.sh migrate         # 执行数据库迁移
#   ./deploy.sh logs [service]  # 查看日志
#   ./deploy.sh status          # 查看状态
#
# ============================================================

services:

  # ----------------------------------------------------------
  # Angular UI — Nginx 静态文件 + API 反向代理（端口 80）
  # nginx-proxy.conf 同时处理：
  #   - Angular 静态文件
  #   - /api/* → API 容器
  #   - /connect/* → API 容器（OpenIddict）
  #   - /.well-known/* → API 容器（OIDC 发现）
  # ----------------------------------------------------------
  knowledgehub-angular:
    image: ${REGISTRY}/knowledgehub-angular:${IMAGE_TAG}
    container_name: knowledgehub-angular
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dynamic-env.json:/usr/share/nginx/html/dynamic-env.json:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - knowledgehub-api
    restart: unless-stopped
    networks:
      - abp-network

  # ----------------------------------------------------------
  # HttpApi.Host — 后端 API（仅内部网络，不暴露端口）
  # 所有外部请求通过 Angular 容器的 Nginx 代理转发
  # ----------------------------------------------------------
  knowledgehub-api:
    image: ${REGISTRY}/knowledgehub-api:${IMAGE_TAG}
    container_name: knowledgehub-api
    hostname: knowledgehub-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:44354
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      # 应用 URL（浏览器实际访问地址，即 Nginx 的地址）
      - App__SelfUrl=${PUBLIC_URL}
      - App__HealthCheckUrl=http://knowledgehub-api:44354/health-status
      - App__AngularUrl=${PUBLIC_URL}
      - App__CorsOrigins=${PUBLIC_URL}
      - App__RedirectAllowedUrls=${PUBLIC_URL}
      # AuthServer（外部可访问地址，用于 token 验证）
      - AuthServer__Authority=${PUBLIC_URL}/
      - AuthServer__RequireHttpsMetadata=false
      # 数据库
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=KnowledgeHub;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Redis__Configuration=redis
      # Meilisearch
      - Meilisearch__Host=http://meilisearch:7700
      - Meilisearch__ApiKey=${MEILISEARCH_MASTER_KEY}
      - Meilisearch__IndexName=documents
      - Meilisearch__EmbeddingDimension=1024
      - Meilisearch__EmbeddingApiKey=${EMBEDDING_API_KEY}
      # LiteParse 文档解析服务（独立容器，仅内部网络）
      - Liteparse__Host=http://liteparse:5707
      - Liteparse__RequestTimeoutSeconds=${LITEPARSE_TIMEOUT:-300}
      - Liteparse__Dpi=${LITEPARSE_DPI:-300}
      # Qwen API
      - Qwen__ApiKey=${QWEN_API_KEY}
      - Qwen__BaseUrl=${QWEN_BASE_URL}
      - Qwen__Model=${QWEN_MODEL}
      # 安全
      - AuthServer__CertificatePassPhrase=${JWT_CERTIFICATE_PASSWORD}
      - StringEncryption__DefaultPassPhrase=${STRING_ENCRYPTION_PASSPHRASE}
      # 日志
      - Serilog__MinimumLevel__Default=Information
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - abp-network

  # ----------------------------------------------------------
  # Meilisearch — 全文搜索引擎
  # ----------------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: meilisearch
    hostname: meilisearch
    platform: linux/amd64
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
      - MEILI_ENV=production
      - MEILI_DB_PATH=/meili_data
      - MEILI_HTTP_ADDR=0.0.0.0:7700
    volumes:
      - ./meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - abp-network

  # ----------------------------------------------------------
  # LiteParse — 文档解析服务（独立容器，外部项目提供镜像）
  # 仅内部网络可达（5707），API 通过主机名 `liteparse` 访问
  # 镜像路径：${LITEPARSE_IMAGE:-${REGISTRY}/knowledgehub-liteparse:${IMAGE_TAG}}
  # 注意：上游镜像可能不提供 /health 端点，这里用 TCP 端口探测
  # ----------------------------------------------------------
  knowledgehub-liteparse:
    image: ${LITEPARSE_IMAGE:-${REGISTRY}/knowledgehub-liteparse:${IMAGE_TAG}}
    container_name: knowledgehub-liteparse
    hostname: liteparse
    platform: linux/amd64
    expose:
      - "5707"
    healthcheck:
      # 用 python3 探测 5707 端口连通性（上游镜像无 /health 端点）
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 5707)); s.close()\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - abp-network

  # ----------------------------------------------------------
  # DbMigrator — 数据库迁移 & OpenIddict 种子数据（一次性任务）
  # 通过 ./deploy.sh migrate 手动执行
  # ----------------------------------------------------------
  db-migrator:
    image: ${REGISTRY}/knowledgehub-db-migrator:${IMAGE_TAG}
    container_name: knowledgehub-db-migrator
    environment:
      - OpenIddict__Applications__KnowledgeHub_App__ClientId=KnowledgeHub_App
      - OpenIddict__Applications__KnowledgeHub_App__RootUrl=${PUBLIC_URL}
      - OpenIddict__Applications__KnowledgeHub_App__RedirectAllowedUrls=${PUBLIC_URL}
      - OpenIddict__Applications__KnowledgeHub_Swagger__ClientId=KnowledgeHub_Swagger
      - OpenIddict__Applications__KnowledgeHub_Swagger__RootUrl=${PUBLIC_URL}
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=KnowledgeHub;Username=postgres;Password=${POSTGRES_PASSWORD}
      - AuthServer__CertificatePassPhrase=${JWT_CERTIFICATE_PASSWORD}
      - StringEncryption__DefaultPassPhrase=${STRING_ENCRYPTION_PASSPHRASE}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - abp-network

  # ----------------------------------------------------------
  # PostgreSQL 16
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    hostname: postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=KnowledgeHub
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - abp-network

  # ----------------------------------------------------------
  # Redis
  # ----------------------------------------------------------
  redis:
    image: redis:alpine
    container_name: redis
    hostname: redis
    platform: linux/amd64
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - abp-network

# ----------------------------------------------------------
# 注意：数据持久化全部使用 bind mount（./xxx），不使用 named volume
# 这样即使误执行 docker compose down -v 也不会删除数据库数据
# ----------------------------------------------------------
networks:
  abp-network:
    driver: bridge
