# HTTP → HTTPS 重定向
server {
    listen       80;
    listen  [::]:80;
    server_name  _;
    return 301 https://$host$request_uri;
}

server {
    listen       443 ssl;
    listen  [::]:443 ssl;
    http2 on;
    server_name  _;

    ssl_certificate /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;

    # 使用 Docker 内部 DNS，配合变量实现动态解析
    # 避免 API 容器重建后 IP 变化导致 502
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream knowledgehub-api;

    # Angular 静态文件
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html =404;

        # 禁用缓存，确保总是获取最新版本
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Angular 运行时环境配置
    location /getEnvConfig {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Content-Type application/json;
        alias /usr/share/nginx/html/dynamic-env.json;
    }

    # Account 页面（登录、注册等）
    location /Account/ {
        proxy_pass http://$api_upstream:44354;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ABP 静态资源（libs, bundles 等）
    location /libs/ {
        proxy_pass http://$api_upstream:44354;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /__bundles/ {
        proxy_pass http://$api_upstream:44354;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ABP 动态脚本（无扩展名，需代理到 API）
    location ~ ^/(Abp|ApplicationLocalizationScript|ApplicationConfigurationScript|ServiceProxyScript|Error) {
        proxy_pass http://$api_upstream:44354;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenIddict Connect 端点（登录、注销、Token 等）
    location /connect/ {
        proxy_pass http://$api_upstream:44354;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://$api_upstream:44354;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 文件上传大小限制
        client_max_body_size 200m;
    }

    # OpenID 配置发现
    location /.well-known/ {
        proxy_pass http://$api_upstream:44354;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查
    location /health-status {
        proxy_pass http://$api_upstream:44354;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
