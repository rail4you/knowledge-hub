<div class="pptx-viewer">
  @if (error()) {
    <div class="viewer-error">{{ error() }}</div>
  } @else {
    <div class="viewer-toolbar">
      <div class="toolbar-group">
        <button nz-button nzSize="small" (click)="prevSlide()" [disabled]="!canGoPrev() || isLoading() || isRendering()">
          <span nz-icon nzType="left"></span>
        </button>
        <span class="viewer-status">{{ slideLabel() }}</span>
        <button nz-button nzSize="small" (click)="nextSlide()" [disabled]="!canGoNext() || isLoading() || isRendering()">
          <span nz-icon nzType="right"></span>
        </button>
      </div>

      <div class="toolbar-group">
        <button nz-button nzSize="small" (click)="zoomOut()" [disabled]="zoom() <= 0.5 || isLoading() || isRendering()">
          <span nz-icon nzType="zoom-out"></span>
        </button>
        <button nz-button nzSize="small" (click)="resetZoom()" [disabled]="zoom() === 1 || isLoading() || isRendering()">
          {{ zoomLabel() }}
        </button>
        <button nz-button nzSize="small" (click)="zoomIn()" [disabled]="zoom() >= 2 || isLoading() || isRendering()">
          <span nz-icon nzType="zoom-in"></span>
        </button>
      </div>
    </div>

    <div class="slide-stage">
      <canvas #slideCanvas class="slide-canvas" [class.hidden]="isLoading()"></canvas>

      @if (isLoading()) {
        <div class="stage-placeholder">正在加载 PPTX…</div>
      }

      @if (isRendering()) {
        <div class="rendering-mask">正在渲染幻灯片…</div>
      }
    </div>

    @if (slideCount() > 1) {
      <div class="page-strip">
        @if (hasLeftEllipsis()) {
          <button type="button" class="page-pill" (click)="goToSlide(0)">1</button>
          <span class="page-ellipsis">...</span>
        }
        @for (pageIndex of visiblePageIndexes(); track pageTrackBy(pageIndex)) {
          <button
            type="button"
            class="page-pill"
            [class.active]="pageIndex === currentSlide()"
            (click)="goToSlide(pageIndex)"
          >
            {{ pageIndex + 1 }}
          </button>
        }
        @if (hasRightEllipsis()) {
          <span class="page-ellipsis">...</span>
          <button type="button" class="page-pill" (click)="goToSlide(slideCount() - 1)">{{ slideCount() }}</button>
        }
      </div>
    }
  }
</div>
