<div class="student-layout">
  <!-- 第一部分：品牌栏 + 登录信息 -->
  <header class="brand-bar">
    <div class="brand-bar__inner">
      <a routerLink="/student" class="brand">
        <span class="brand__logo" aria-hidden="true">
          <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="brandGrad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
                <stop stop-color="#1E6CE8"/>
                <stop offset="1" stop-color="#00B7FF"/>
              </linearGradient>
            </defs>
            <rect width="44" height="44" rx="10" fill="url(#brandGrad)"/>
            <path d="M12 14.5h20a1.5 1.5 0 011.5 1.5v9.4a1.5 1.5 0 01-1.5 1.5H21l-5.4 3.6a.5.5 0 01-.77-.42v-3.18H12a1.5 1.5 0 01-1.5-1.5V16a1.5 1.5 0 011.5-1.5z" fill="#fff" opacity=".95"/>
            <circle cx="17.5" cy="20.7" r="1.4" fill="#1E6CE8"/>
            <circle cx="22" cy="20.7" r="1.4" fill="#1E6CE8"/>
            <circle cx="26.5" cy="20.7" r="1.4" fill="#1E6CE8"/>
          </svg>
        </span>
        <span class="brand__text">
          <span class="brand__title">易课通</span>
          <span class="brand__divider" aria-hidden="true">|</span>
          <span class="brand__subtitle">在线教学资源库</span>
        </span>
      </a>

      <div class="brand-bar__actions">
        <a routerLink="/" class="brand-bar__back" title="返回主站">
          <span nz-icon nzType="home" nzTheme="outline"></span>
          <span class="brand-bar__back-text">主站首页</span>
        </a>

        <div class="brand-bar__user" nz-dropdown [nzDropdownMenu]="userMenu" nzTrigger="click">
          <span class="user-avatar" [style.background]="avatarGradient()">
            {{ userInitial }}
          </span>
          <span class="user-meta">
            <span class="user-meta__name">你好，{{ userName() }}</span>
            <span class="user-meta__role">{{ userRoleLabel() }}</span>
          </span>
          <span nz-icon nzType="caret-down" class="user-meta__caret"></span>
        </div>

        <nz-dropdown-menu #userMenu="nzDropdownMenu">
          <ul nz-menu class="user-menu">
            <li nz-menu-item class="user-menu__info">
              <div class="user-menu__avatar" [style.background]="avatarGradient()">
                {{ userInitial }}
              </div>
              <div class="user-menu__detail">
                <div class="user-menu__name">{{ userName() }}</div>
                <div class="user-menu__role">{{ userRoleLabel() }} · 已登录</div>
              </div>
            </li>
            <li nz-menu-divider></li>
            <li nz-menu-item (click)="logout()">
              <span nz-icon nzType="logout" nzTheme="outline"></span>
              <span>退出登录</span>
            </li>
          </ul>
        </nz-dropdown-menu>
      </div>
    </div>
  </header>

  <!-- 第二部分：Tab 导航 -->
  <nav class="tab-bar" aria-label="主导航">
    <div class="tab-bar__inner">
      <div class="tab-bar__tabs">
        <a routerLink="/student/courses" routerLinkActive="active" class="tab-link">
          <span nz-icon nzType="read" nzTheme="outline"></span>
          <span>课程中心</span>
        </a>
        <a routerLink="/student/resources" routerLinkActive="active" class="tab-link">
          <span nz-icon nzType="database" nzTheme="outline"></span>
          <span>资源库</span>
        </a>
        <a routerLink="/student/news" routerLinkActive="active" class="tab-link">
          <span nz-icon nzType="file-text" nzTheme="outline"></span>
          <span>资讯中心</span>
        </a>
        <a routerLink="/student/my-learning" routerLinkActive="active" class="tab-link">
          <span nz-icon nzType="line-chart" nzTheme="outline"></span>
          <span>我的学习</span>
        </a>
        <a routerLink="/student/favorites" routerLinkActive="active" class="tab-link">
          <span nz-icon nzType="star" nzTheme="outline"></span>
          <span>我的收藏</span>
        </a>
        <a routerLink="/student/agent-tasks" routerLinkActive="active" class="tab-link">
          <span nz-icon nzType="robot" nzTheme="outline"></span>
          <span>课堂任务</span>
        </a>
      </div>
      <div class="tab-bar__hint" aria-hidden="true">
        <span class="tab-bar__pulse"></span>
        <span>数字资源 · 助力教学</span>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <app-auth-error-modal></app-auth-error-modal>

  <footer class="app-footer">
    <div class="footer-container">
      <div class="footer-links">
        <a href="#">关于我们</a>
        <a href="#">帮助中心</a>
        <a href="#">隐私政策</a>
        <a href="#">联系客服</a>
      </div>
      <div class="footer-copyright">
        &copy; 2026 易课通在线教学资源库 · 让学习更简单
      </div>
    </div>
  </footer>
</div>
