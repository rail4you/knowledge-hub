<div class="recruitment-live-management">
  <div class="page-header">
    <h2>
      <span nz-icon nzType="video-camera" nzTheme="outline"></span>
      我的直播
    </h2>
    <button nz-button nzType="primary" (click)="openCreateModal()">
      <span nz-icon nzType="plus" nzTheme="outline"></span>
      创建直播
    </button>
  </div>

  <nz-table
    #table
    [nzData]="lives()"
    [nzTotal]="total()"
    [nzPageIndex]="pageIndex()"
    [nzPageSize]="pageSize()"
    [nzLoading]="loading()"
    (nzPageIndexChange)="pageChange($event)"
    [nzFrontPagination]="false"
    nzSize="middle"
  >
    <thead>
      <tr>
        <th nzWidth="30%">标题</th>
        <th nzWidth="15%">学生</th>
        <th nzWidth="10%">状态</th>
        <th nzWidth="15%">计划时间</th>
        <th nzWidth="15%">创建时间</th>
        <th nzWidth="15%">操作</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let live of lives()">
        <td>{{ live.title }}</td>
        <td>{{ live.studentName || '未分配' }}</td>
        <td>
          <nz-tag [nzColor]="statusColor(live.status)">{{ statusText(live.status) }}</nz-tag>
        </td>
        <td>{{ live.scheduledAt ? (live.scheduledAt | date: 'yyyy-MM-dd HH:mm') : '-' }}</td>
        <td>{{ live.creationTime | date: 'yyyy-MM-dd HH:mm' }}</td>
        <td>
          <button
            nz-button nzType="primary" nzSize="small"
            *ngIf="canEnter(live)"
            (click)="enterLive(live)"
          >
            <span nz-icon nzType="video-camera" nzTheme="outline"></span>
            进入
          </button>
          <button
            nz-button nzSize="small" nzDanger nzType="default"
            *ngIf="canCancel(live)"
            nz-popconfirm
            nzPopconfirmTitle="确定要取消该直播吗？"
            (nzOnConfirm)="cancelLive(live)"
          >
            取消
          </button>
          <button
            nz-button nzSize="small" nzDanger
            *ngIf="canDelete(live)"
            nz-popconfirm
            nzPopconfirmTitle="确定要删除该直播吗？"
            (nzOnConfirm)="deleteLive(live)"
          >
            删除
          </button>
          <span *ngIf="live.status === 1 && !canEnter(live)" style="color: #999">-</span>
        </td>
      </tr>
    </tbody>
  </nz-table>
</div>

<!-- Create live modal -->
<nz-modal
  [(nzVisible)]="createModalVisible"
  nzTitle="创建直播"
  [nzFooter]="createModalFooter"
  (nzOnCancel)="closeCreateModal()"
>
  <div *nzModalContent>
    <form nz-form [formGroup]="form" class="create-form">
      <nz-form-item>
        <nz-form-label nzRequired>直播标题</nz-form-label>
        <nz-form-control [nzErrorTip]="'请输入直播标题'">
          <input nz-input formControlName="title" placeholder="输入直播标题" maxlength="200" />
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>描述</nz-form-label>
        <nz-form-control>
          <textarea nz-input formControlName="description" placeholder="直播描述（可选）" rows="3" maxlength="1000"></textarea>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>分配学生</nz-form-label>
        <nz-form-control>
          <nz-select
            formControlName="studentId"
            nzAllowClear
            nzPlaceHolder="搜索并选择学生（可选）"
            [nzLoading]="studentLoading()"
            nzShowSearch
            nzServerSearch
            (nzOnSearch)="onStudentSearch($event)"
          >
            <nz-option *ngFor="let s of students()" [nzValue]="s.id" [nzLabel]="s.name + ' (' + s.userName + ')'">
              {{ s.name }}（{{ s.userName }}）
            </nz-option>
          </nz-select>
        </nz-form-control>
      </nz-form-item>

      <nz-form-item>
        <nz-form-label>计划时间</nz-form-label>
        <nz-form-control>
          <nz-date-picker
            formControlName="scheduledAt"
            nzShowTime
            nzShowNow
            nzPlaceHolder="选择计划开始时间（可选）"
            style="width: 100%"
          ></nz-date-picker>
        </nz-form-control>
      </nz-form-item>
    </form>
  </div>

  <ng-template #createModalFooter>
    <button nz-button (click)="closeCreateModal()">取消</button>
    <button nz-button nzType="primary" [nzLoading]="loading()" (click)="submit()">
      <span nz-icon nzType="plus" nzTheme="outline"></span>
      确认创建
    </button>
  </ng-template>
</nz-modal>
