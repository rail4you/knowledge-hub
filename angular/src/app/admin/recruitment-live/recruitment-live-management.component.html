<div class="recruitment-live-management">
  <div class="page-header">
    <h2>
      <span nz-icon nzType="video-camera" nzTheme="outline"></span>
      我的直播
    </h2>
    <button nz-button nzType="primary" (click)="createLive()">
      <span nz-icon nzType="plus" nzTheme="outline"></span>
      创建直播
    </button>
  </div>

  <nz-table
    #table
    [nzData]="lives()"
    [nzTotal]="total()"
    [nzPageIndex]="pageIndex()"
    [nzPageSize]="pageSize()"
    [nzLoading]="loading()"
    (nzPageIndexChange)="pageChange($event)"
    [nzFrontPagination]="false"
    nzSize="middle"
  >
    <thead>
      <tr>
        <th nzWidth="30%">标题</th>
        <th nzWidth="15%">学生</th>
        <th nzWidth="10%">状态</th>
        <th nzWidth="15%">计划时间</th>
        <th nzWidth="15%">创建时间</th>
        <th nzWidth="15%">操作</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let live of lives()">
        <td>{{ live.title }}</td>
        <td>{{ live.studentName || '未分配' }}</td>
        <td>
          <nz-tag [nzColor]="statusColor(live.status)">{{ statusText(live.status) }}</nz-tag>
        </td>
        <td>{{ live.scheduledAt ? (live.scheduledAt | date: 'yyyy-MM-dd HH:mm') : '-' }}</td>
        <td>{{ live.creationTime | date: 'yyyy-MM-dd HH:mm' }}</td>
        <td>
          <button
            nz-button nzType="primary" nzSize="small"
            *ngIf="canEnter(live)"
            (click)="enterLive(live)"
          >
            <span nz-icon nzType="video-camera" nzTheme="outline"></span>
            进入
          </button>
          <button
            nz-button nzSize="small" nzDanger nzType="default"
            *ngIf="canCancel(live)"
            nz-popconfirm
            nzPopconfirmTitle="确定要取消该直播吗？"
            (nzOnConfirm)="cancelLive(live)"
          >
            取消
          </button>
          <button
            nz-button nzSize="small" nzDanger
            *ngIf="canDelete(live)"
            nz-popconfirm
            nzPopconfirmTitle="确定要删除该直播吗？"
            (nzOnConfirm)="deleteLive(live)"
          >
            删除
          </button>
          <span *ngIf="live.status === 1 && !canEnter(live)" style="color: #999">-</span>
        </td>
      </tr>
    </tbody>
  </nz-table>
</div>
