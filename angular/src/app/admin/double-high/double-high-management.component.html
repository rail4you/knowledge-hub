<div class="page">
  <nz-card nzTitle="双高评估项目管理" [nzExtra]="extraTpl">
    <ng-template #extraTpl>
      <button nz-button nzType="primary" (click)="openCreate()">新建项目</button>
    </ng-template>

    <nz-table [nzData]="items()" [nzFrontPagination]="false">
      <thead>
        <tr>
          <th>项目</th>
          <th>批次</th>
          <th>状态</th>
          <th>指标数</th>
          <th>完成率</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        @for (item of items(); track item.id) {
          <tr>
            <td>{{ item.title }}</td>
            <td>{{ item.batchCode }}</td>
            <td>{{ getStatusLabel(item.status) }}</td>
            <td>{{ item.indicatorCount }}</td>
            <td>{{ item.completionRate }}%</td>
            <td class="actions">
              <button nz-button nzType="link" (click)="openEdit(item)">编辑</button>
              <button nz-button nzType="link" nzDanger (click)="delete(item.id)">删除</button>
            </td>
          </tr>
        }
      </tbody>
    </nz-table>
  </nz-card>

  <nz-modal
    [nzVisible]="modalVisible()"
    [nzTitle]="editingId ? '编辑双高评估项目' : '新建双高评估项目'"
    [nzWidth]="980"
    (nzOnCancel)="modalVisible.set(false)"
    (nzOnOk)="save()"
  >
    <ng-container *nzModalContent>
      <div class="form-grid">
        <label>项目名称</label>
        <input nz-input [(ngModel)]="form.title" />

        <label>批次编码</label>
        <input nz-input [(ngModel)]="form.batchCode" />

        <label>项目说明</label>
        <textarea nz-input rows="4" [(ngModel)]="form.description"></textarea>

        <label>状态</label>
        <nz-select [(ngModel)]="form.status">
          <nz-option [nzValue]="statuses.Draft" nzLabel="草稿"></nz-option>
          <nz-option [nzValue]="statuses.Active" nzLabel="进行中"></nz-option>
          <nz-option [nzValue]="statuses.Closed" nzLabel="已关闭"></nz-option>
        </nz-select>

        <label>开始时间</label>
        <input nz-input type="datetime-local" [(ngModel)]="form.startTime" />

        <label>结束时间</label>
        <input nz-input type="datetime-local" [(ngModel)]="form.endTime" />
      </div>

      <div class="sub-section">
        <div class="sub-toolbar">
          <h3>指标配置</h3>
          <button nz-button (click)="addIndicator()">新增指标</button>
        </div>

        @for (indicator of form.indicators; track $index) {
          <div class="indicator-grid">
            <input nz-input [(ngModel)]="indicator.categoryName" placeholder="分类，如 产教融合 / 教学成果" />
            <input nz-input [(ngModel)]="indicator.indicatorCode" placeholder="指标编码" />
            <input nz-input [(ngModel)]="indicator.name" placeholder="指标名称" />
            <textarea nz-input rows="2" [(ngModel)]="indicator.description" placeholder="指标说明"></textarea>
            <input nz-input [(ngModel)]="indicator.unit" placeholder="单位，如 项 / 门 / %" />
            <nz-select [(ngModel)]="indicator.dataSourceType">
              <nz-option [nzValue]="dataSources.Manual" nzLabel="手工填报"></nz-option>
              <nz-option [nzValue]="dataSources.ResourceCount" nzLabel="资源数量"></nz-option>
              <nz-option [nzValue]="dataSources.CourseCount" nzLabel="课程数量"></nz-option>
              <nz-option [nzValue]="dataSources.MicroMajorCount" nzLabel="微专业数量"></nz-option>
              <nz-option [nzValue]="dataSources.PracticumProjectCount" nzLabel="实训项目数量"></nz-option>
              <nz-option [nzValue]="dataSources.NewsArticleCount" nzLabel="资讯数量"></nz-option>
              <nz-option [nzValue]="dataSources.MicroMajorEnrollmentCount" nzLabel="微专业报名量"></nz-option>
              <nz-option [nzValue]="dataSources.PracticumEnrollmentCount" nzLabel="实训参与量"></nz-option>
            </nz-select>
            <input nz-input type="number" [(ngModel)]="indicator.targetValue" placeholder="目标值" />
            <input nz-input type="number" [(ngModel)]="indicator.weight" placeholder="权重" />
            <button nz-button nzDanger (click)="removeIndicator($index)">删除指标</button>
          </div>
        }
      </div>
    </ng-container>
  </nz-modal>
</div>
