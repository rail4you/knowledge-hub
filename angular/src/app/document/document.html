<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h5 class="card-title">
          {{ '::Menu:Documents' | abpLocalization }}
        </h5>
      </div>
      <div class="text-end col col-md-6">
        <div class="text-lg-end pt-2">
          <button *abpPermission="'KnowledgeHub.Documents.Create'" id="create" class="btn btn-primary" type="button" (click)="createDocument()">
            <i class="fa fa-plus me-1"></i>
            <span>{{ "::NewDocument" | abpLocalization }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="card-body">
    <ngx-datatable [rows]="document.items" [count]="document.totalCount" [list]="list" default>
      <ngx-datatable-column
        [name]="'::Actions' | abpLocalization"
        [maxWidth]="150"
        [sortable]="false"
      >
        <ng-template let-row="row" ngx-datatable-cell-template>
          <div ngbDropdown container="body" class="d-inline-block">
            <button
              class="btn btn-primary btn-sm dropdown-toggle"
              data-toggle="dropdown"
              aria-haspopup="true"
              ngbDropdownToggle
            >
              <i class="fa fa-cog me-1"></i>{{ '::Actions' | abpLocalization }}
            </button>
            <div ngbDropdownMenu>
              <button *abpPermission="'KnowledgeHub.Documents.Edit'" ngbDropdownItem (click)="editDocument(row.id)">
                {{ '::Edit' | abpLocalization }}
              </button>
              <button *abpPermission="'KnowledgeHub.Documents.Delete'" ngbDropdownItem (click)="delete(row.id)">
                {{ '::Delete' | abpLocalization }}
              </button>
            </div>
          </div>
        </ng-template>
      </ngx-datatable-column>
      <ngx-datatable-column [name]="'::Name' | abpLocalization" prop="name" />
      <ngx-datatable-column [name]="'::Type' | abpLocalization">
        <ng-template let-row="row" ngx-datatable-cell-template>
          {{ getDocumentTypeName(row.type) }}
        </ng-template>
      </ngx-datatable-column>
      <ngx-datatable-column [name]="'::PublishDate' | abpLocalization">
        <ng-template let-row="row" ngx-datatable-cell-template>
          {{ row.publishDate | date }}
        </ng-template>
      </ngx-datatable-column>
      <ngx-datatable-column [name]="'::Price' | abpLocalization">
        <ng-template let-row="row" ngx-datatable-cell-template>
          {{ row.price | currency }}
        </ng-template>
      </ngx-datatable-column>
      <ngx-datatable-column [name]="'::Menu:Users' | abpLocalization" prop="userName" />
    </ngx-datatable>
  </div>
</div>

<abp-modal [(visible)]="isModalOpen">
  <ng-template #abpHeader>
    <h3>{{ (selectedDocument.id ? '::Edit' : '::NewDocument') | abpLocalization }}</h3>
  </ng-template>

  <ng-template #abpBody>
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="form-group">
        <label for="document-name">Name</label><span> * </span>
        <input type="text" id="document-name" class="form-control" formControlName="name" autofocus />
      </div>
      <div class="form-group">
        <label for="document-type">Type</label><span> * </span>
        <select id="document-type" class="form-select" formControlName="type">
          <option [ngValue]="null">Select a type</option>
          @for (type of documentTypes; track type.value) {
            <option [ngValue]="type.value">
              {{ getDocumentTypeName(type.value) }}
            </option>
          }
        </select>
      </div>
      <div class="form-group">
        <label for="document-user">User</label><span> * </span>
        <select id="document-user" class="form-select" formControlName="userId">
          <option [ngValue]="null">Select a user</option>
          @for (user of users(); track user.id) {
            <option [ngValue]="user.id">
              {{ user.name }}
            </option>
          }
        </select>
      </div>
      <div class="mt-2">
        <label>Publish date</label><span> * </span>
        <input
          #datepicker="ngbDatepicker"
          class="form-control"
          name="datepicker"
          formControlName="publishDate"
          ngbDatepicker
          (click)="datepicker.toggle()"
        />
      </div>
      <div class="form-group">
        <label for="document-price">Price</label><span> * </span>
        <input type="number" id="document-price" class="form-control" formControlName="price" />
      </div>
    </form>
  </ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>
      {{ '::Close' | abpLocalization }}
    </button>

    <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
      <i class="fa fa-check mr-1"></i>
      {{ '::Save' | abpLocalization }}
    </button>
  </ng-template>
</abp-modal>
